<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage E-commerce Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #648d21; /* Amazon-style green */
            color: #f9a800; /* Gold */
            text-align: center;
            padding: 20px;
        }
        .product {
            border: 1px solid #ccc;
            border-radius: 10px;
            margin: 15px;
            padding: 10px;
            background-color: white;
        }
        .cart {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background-color: #eaeaea;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Vintage E-commerce Store!</h1>
        <p>Your one-stop shop for all things vintage!</p>
    </header>
    <main>
        <div class="product">
            <h2>Vintage Jacket</h2>
            <p>Price: $49.99</p>
            <button>Add to Cart</button>
        </div>
        <div class="product">
            <h2>Retro Sunglasses</h2>
            <p>Price: $24.99</p>
            <button>Add to Cart</button>
        </div>
        <div class="cart">
            <h2>Your Shopping Cart</h2>
            <span>Items in Cart: 0</span>
        </div>
    </main>
    <script>
        const cartButtons = document.querySelectorAll('button');
        let cartCount = 0;

        cartButtons.forEach(button => {
            button.addEventListener('click', () => {
                cartCount++;
                document.querySelector('.cart span').innerText = `Items in Cart: ${cartCount}`;
            });
        });
    </script>
</body>
</html>
