<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISE - Inventory Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2C3E50;
            --success-green: #27AE60;
            --accent-orange: #E67E22;
        }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: var(--primary-blue); }
        .btn-primary { background-color: var(--primary-blue); border: none; }
        .btn-success { background-color: var(--success-green); border: none; }
        .status-badge { background-color: var(--accent-orange); color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand mb-0 h1">RISE | Bookstore Management</span>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Inventory Manager</h2>
        <button class="btn btn-success">+ Add New Book</button>
    </div>

    <div class="input-group mb-4">
        <input type="text" class="form-control" placeholder="Search by Title, Author, or ISBN...">
        <button class="btn btn-outline-secondary" type="button">Search</button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Image</th>
                        <th>Title & Author</th>
                        <th>ISBN</th>
                        <th>Condition</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><div style="width:40px; height:50px; background:#ddd; border:1px solid #ccc; text-align:center; line-height:50px;">X</div></td>
                        <td><strong>The Great Gatsby</strong><br><small class="text-muted">F. Scott Fitzgerald</small></td>
                        <td>978-0743273565</td>
                        <td><span class="status-badge">Rare</span></td>
                        <td>$450.00</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary">Edit</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
