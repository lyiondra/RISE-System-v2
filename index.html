<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISE | Rare-Book Inventory & Sales Ecosystem</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ink: #1B1B1B;
            --cream: #FDFCF8;
            --burgundy: #630D16;
            --gold: #C5A059;
            --stone: #78716c;
        }

        body { 
            background-color: var(--cream); 
            font-family: 'Inter', sans-serif; 
            color: var(--ink);
        }

        h1, h2, .navbar-brand { font-family: 'Playfair Display', serif; font-weight: 700; }

        /* Navigation */
        .navbar { background-color: var(--ink); border-bottom: 2px solid var(--gold); }
        .navbar-brand { color: var(--cream) !important; letter-spacing: 1px; }

        /* Census Dashboard Cards */
        .census-card {
            background: white;
            border: 1px solid #EAEAEA;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s;
        }
        .census-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .stat-number { font-size: 2.5rem; font-weight: 600; color: var(--ink); }
        .stat-label { color: var(--stone); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        /* Buttons & Badges */
        .btn-burgundy { background-color: var(--burgundy); color: white; border: none; }
        .btn-burgundy:hover { background-color: #4a0a10; color: white; }
        .status-badge { background-color: var(--gold); color: white; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand mb-0 h1">RISE System</span>
</nav>
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-content p-4 mx-auto mt-5" style="max-width: 500px;">
    <h3>Register Rare Book</h3>
    <input type="text" id="titleInput" placeholder="Book Title" class="form-control mb-2">
    <input type="text" id="authorInput" placeholder="Author" class="form-control mb-2">
    <input type="number" id="priceInput" placeholder="Valuation ($)" class="form-control mb-2">
    <button id="saveBookBtn" class="btn btn-burgundy">Add to Archive</button>
  </div>
</div>
<div class="container mt-5">
    
    <div class="row mb-5 text-center">
        <div class="col-md-4 mb-3">
            <div class="census-card">
                <p class="stat-label">Total Archive Items</p>
                <p id="totalItems" class="stat-number">1,240</p>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="census-card">
                <p class="stat-label">Active Interest (Carts)</p>
                <p id="itemsInCarts" class="stat-number">14</p>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="census-card">
                <p class="stat-label">Sold Today</p>
                <p id="soldToday" class="stat-number" style="color: var(--burgundy);">4</p>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Inventory Collection</h2>
        <button id="addBookBtn" class="btn btn-burgundy px-4">+ Register New Acquisition</button>
    </div>

    <div class="input-group mb-4 shadow-sm">
        <input id="searchInput" type="text" class="form-control border-0 p-3" placeholder="Search the archive (Title, Author, ISBN)...">
        <button id="searchBtn" class="btn btn-dark px-4" type="button">Search</button>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="bg-light">
                    <tr class="stat-label">
                        <th class="p-3">Reference</th>
                        <th class="p-3">Title & Author</th>
                        <th class="p-3">ISBN</th>
                        <th class="p-3">Status</th>
                        <th class="p-3">Valuation</th>
                        <th class="p-3 text-end">Management</th>
                    </tr>
                </thead>
                <tbody id="inventoryTbody">
                    <tr class="align-middle">
                        <td class="p-3">
                            <div style="width:45px; height:60px; background:#f1f1f1; border-radius:4px; display:flex; align-items:center; justify-content:center; color:#ccc;">
                                <small>IMG</small>
                            </div>
                        </td>
                        <td class="p-3">
                            <span class="fw-bold">The Great Gatsby</span><br>
                            <small class="text-muted italic">F. Scott Fitzgerald</small>
                        </td>
                        <td class="p-3 text-muted">978-0743273565</td>
                        <td class="p-3"><span class="status-badge">Rare</span></td>
                        <td class="p-3 fw-bold">$450.00</td>
                        <td class="p-3 text-end">
                            <button class="btn btn-sm btn-outline-dark">Edit Entry</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
