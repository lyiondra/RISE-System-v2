name: Deploy RISE Portal
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build
        run: |
          npm install
          npm run build

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist # This looks for 'dist' at the very top level
          
  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4